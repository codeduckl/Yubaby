<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五一劳动节 · AI智能助手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366F1',
                        secondary: '#8B5CF6',
                        light: '#F8FAFC',
                        dark: '#1E293B'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F8FAFC;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .message-user {
            background-color: #6366F1;
            color: white;
            border-radius: 1rem 1rem 0.25rem 1rem;
        }
        .message-ai {
            background-color: white;
            color: #1E293B;
            border-radius: 1rem 1rem 1rem 0.25rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .typing-effect {
            overflow: hidden;
            border-right: 2px solid #6366F1;
            white-space: nowrap;
            animation: typing 2s steps(40, end), blink-caret 0.75s step-end infinite;
        }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #6366F1 } }
        .loading-dots span {
            animation: pulse 1.4s ease-in-out infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="max-w-3xl mx-auto px-4 py-6">
        <!-- 顶部标题 -->
        <header class="text-center mb-8">
            <h1 class="text-[clamp(1.8rem,5vw,2.5rem)] font-bold text-dark mb-2">
                🤖 五一劳动节 · AI智能助手
            </h1>
            <p class="text-gray-600">
                致敬每一份努力，用AI帮你生成专属劳动节祝福、文案、问答～
            </p>
        </header>

        <!-- 快捷问题 -->
        <div class="flex flex-wrap gap-2 mb-6 justify-center">
            <button class="quick-question bg-white px-4 py-2 rounded-full text-sm text-gray-700 hover:bg-primary hover:text-white transition-colors" data-question="帮我写五一劳动节祝福语">
                ✍️ 写劳动节祝福语
            </button>
            <button class="quick-question bg-white px-4 py-2 rounded-full text-sm text-gray-700 hover:bg-primary hover:text-white transition-colors" data-question="帮我写五一贺卡文案">
                🎨 贺卡文案
            </button>
            <button class="quick-question bg-white px-4 py-2 rounded-full text-sm text-gray-700 hover:bg-primary hover:text-white transition-colors" data-question="五一朋友圈文案怎么写">
                📱 朋友圈文案
            </button>
            <button class="quick-question bg-white px-4 py-2 rounded-full text-sm text-gray-700 hover:bg-primary hover:text-white transition-colors" data-question="五一祝福短信">
                💬 祝福短信
            </button>
        </div>

        <!-- 对话容器 -->
        <div id="chatContainer" class="bg-white rounded-2xl shadow-lg p-6 mb-6 h-[500px] overflow-y-auto">
            <!-- 欢迎消息 -->
            <div class="flex gap-3 mb-6">
                <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white text-sm">
                    AI
                </div>
                <div class="message-ai px-4 py-3 max-w-[80%]">
                    <p class="typing-effect">你好呀！我是你的劳动节专属AI助手，有什么问题都可以问我～</p>
                </div>
            </div>
            <!-- 对话内容会在这里动态添加 -->
        </div>

        <!-- 输入区域 -->
        <div class="bg-white rounded-2xl shadow-lg p-4">
            <div class="flex gap-3">
                <textarea 
                    id="userInput" 
                    class="flex-1 p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/50 resize-none h-16"
                    placeholder="输入你的问题，比如：帮我写五一祝福语..."
                ></textarea>
                <button 
                    id="sendBtn" 
                    class="bg-primary text-white px-6 py-3 rounded-xl hover:bg-secondary transition-colors flex items-center gap-2"
                >
                    发送
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0l-2-3m2 3h3" />
                    </svg>
                </button>
            </div>
            <p class="text-xs text-gray-500 mt-2 text-center">
                基于Kimi大模型，劳动节专属优化，回答仅供参考
            </p>
        </div>

        <!-- 页脚 -->
        <footer class="text-center mt-8 text-gray-500 text-sm">
            <p>✨ 五一劳动节快乐 · 致敬每一份努力 ✨</p>
        </footer>
    </div>

    <script>
        // ====== Kimi API 配置（你的API Key） ======
        const KIMI_API_KEY = "sk-TC75yVtbc2L4b2bkxkjjqnb9648VdAsr4rR1LfIicFi5mMYv";
        const KIMI_API_URL = "https://api.moonshot.cn/v1/chat/completions";

        // ====== 工具函数 ======
        const Utils = {
            // 添加消息到对话
            addMessage: (role, content, isLoading = false) => {
                const chatContainer = document.getElementById('chatContainer');
                const messageDiv = document.createElement('div');
                messageDiv.className = 'flex gap-3 mb-4';

                if (role === 'user') {
                    // 用户消息：右对齐
                    messageDiv.className += ' justify-end';
                    messageDiv.innerHTML = `
                        <div class="message-user px-4 py-3 max-w-[80%]">
                            <p>${content}</p>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-gray-400 flex items-center justify-center text-white text-sm">
                            你
                        </div>
                    `;
                } else {
                    // AI消息：左对齐
                    let contentHtml = content;
                    if (isLoading) {
                        contentHtml = `
                            <div class="loading-dots flex gap-1">
                                <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                                <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                                <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                            </div>
                        `;
                    }
                    messageDiv.innerHTML = `
                        <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white text-sm">
                            AI
                        </div>
                        <div class="message-ai px-4 py-3 max-w-[80%]">
                            <p>${contentHtml}</p>
                        </div>
                    `;
                }

                chatContainer.appendChild(messageDiv);
                // 滚动到底部
                chatContainer.scrollTop = chatContainer.scrollHeight;
                return messageDiv;
            },
            // 滚动到底部
            scrollToBottom: () => {
                const chatContainer = document.getElementById('chatContainer');
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        };

        // ====== Kimi API 调用 ======
        const callKimiApi = async (messages) => {
            try {
                const response = await fetch(KIMI_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${KIMI_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "moonshot-v1-8k",
                        messages: messages,
                        temperature: 0.7,
                        max_tokens: 1000
                    })
                });

                if (!response.ok) {
                    throw new Error(`API请求失败：${response.status}`);
                }

                const data = await response.json();
                return {
                    success: true,
                    content: data.choices[0].message.content
                };
            } catch (error) {
                console.error('Kimi API调用失败:', error);
                return {
                    success: false,
                    message: error.message
                };
            };
        };

        // ====== 发送消息 ======
        const sendMessage = async (content) => {
            if (!content.trim()) return;

            // 清空输入框
            document.getElementById('userInput').value = '';
            // 禁用发送按钮
            document.getElementById('sendBtn').disabled = true;

            // 添加用户消息
            Utils.addMessage('user', content);

            // 添加AI加载消息
            const aiMessageEl = Utils.addMessage('assistant', '', true);

            // 构建对话历史
            const messages = [
                {
                    role: "system",
                    content: "你是一个劳动节专属的AI助手，擅长生成劳动节相关的祝福、文案、问答。回答要简洁、友好、贴合劳动节主题。"
                }
            ];

            // 收集历史对话
            const chatMessages = document.querySelectorAll('#chatContainer > div');
            chatMessages.forEach(msg => {
                const isUser = msg.querySelector('.message-user') !== null;
                const text = msg.querySelector('p').textContent;
                if (text && !text.includes('loading-dots')) {
                    messages.push({
                        role: isUser ? 'user' : 'assistant',
                        content: text
                    });
                }
            });

            // 调用Kimi API
            const result = await callKimiApi(messages);

            // 移除加载消息
            aiMessageEl.remove();

            if (result.success) {
                // 添加AI回答
                Utils.addMessage('assistant', result.content);
            } else {
                // 错误处理
                Utils.addMessage('assistant', `抱歉，调用AI失败了：${result.message}，请重试～`);
            }

            // 恢复按钮
            document.getElementById('sendBtn').disabled = false;
        };

        // ====== 初始化 ======
        window.addEventListener('DOMContentLoaded', () => {
            // 发送按钮点击
            document.getElementById('sendBtn').addEventListener('click', () => {
                const input = document.getElementById('userInput');
                sendMessage(input.value);
            });

            // 回车发送
            document.getElementById('userInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    const input = document.getElementById('userInput');
                    sendMessage(input.value);
                }
            });

            // 快捷问题点击
            document.querySelectorAll('.quick-question').forEach(btn => {
                btn.addEventListener('click', () => {
                    const question = btn.dataset.question;
                    document.getElementById('userInput').value = question;
                    sendMessage(question);
                });
            });
        });
    </script>
</body>
</html>
